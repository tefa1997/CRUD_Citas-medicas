<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Citas Médicas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container">
      <h1 class="title has-text-centered">📋 Registro de Citas Médicas</h1>

      <!-- Formulario -->
      <form id="formCita" class="box">
        <div class="field">
          <label class="label">Número de Seguro</label>
          <div class="control">
            <input class="input" type="text" id="seguro" placeholder="Ej: 1234567890" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Nombre Completo</label>
          <div class="control">
            <input class="input" type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Cédula</label>
          <div class="control">
            <input class="input" type="text" id="cedula" placeholder="Ej: 0102030405" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Correo Electrónico</label>
          <div class="control">
            <input class="input" type="email" id="correo" placeholder="ejemplo@correo.com" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Fecha de Nacimiento</label>
          <div class="control">
            <input class="input" type="date" id="nacimiento" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Fecha de Cita</label>
          <div class="control">
            <input class="input" type="date" id="fechaCita" required>
          </div>
        </div>

        <div class="field">
          <label class="label">Motivo de la Cita</label>
          <div class="control">
            <textarea class="textarea" id="motivo" placeholder="Describe el motivo..." required></textarea>
          </div>
        </div>

        <div class="field is-grouped is-grouped-centered">
          <div class="control">
            <button type="submit" class="button is-primary">Guardar Cita</button>
          </div>
          <div class="control">
            <button type="reset" class="button is-light">Limpiar</button>
          </div>
        </div>
      </form>

      <!-- Tabla de citas -->
      <h2 class="subtitle has-text-centered">📑 Lista de Citas</h2>
      <div class="table-container">
        <table class="table is-striped is-fullwidth" id="tablaCitas">
          <thead>
            <tr>
              <th>N° Seguro</th>
              <th>Nombre</th>
              <th>Cédula</th>
              <th>Correo</th>
              <th>Nacimiento</th>
              <th>Fecha Cita</th>
              <th>Motivo</th>
            </tr>
          </thead>
          <tbody>
            <!-- Aquí se insertarán las filas dinámicamente con JS -->
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- Script externo para DOM y LocalStorage -->
  <script src="app.js"></script>
</body>
</html>
